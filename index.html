<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Todo Card</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <article data-testid="test-todo-card" role="region" aria-label="Todo task card">

    <div class="card-header">
      <div class="checkbox-wrap">
        <label for="todo-complete" class="sr-only">Mark task as complete</label>
        <input
          type="checkbox"
          id="todo-complete"
          data-testid="test-todo-complete-toggle"
          aria-label="Mark task as complete"
        >
      </div>
      <div class="title-area">
        <h2 data-testid="test-todo-title">Redesign the onboarding flow</h2>
      </div>
      <span
        data-testid="test-todo-priority"
        class="priority-high"
        aria-label="Priority: High"
      >High</span>
    </div>

    <p data-testid="test-todo-description">
      Update the user onboarding screens to align with the new design system.
      Includes updated copy, revised step order, and new illustration assets.
    </p>

    <div class="meta-row">
      <div class="meta-item">
        <span class="meta-icon" aria-hidden="true">📅</span>
        <time data-testid="test-todo-due-date" datetime="2026-04-16T18:00:00Z">
          Due Apr 16, 2026
        </time>
      </div>
      <time
        data-testid="test-todo-time-remaining"
        id="time-remaining"
        aria-live="polite"
        aria-label="Time remaining"
        datetime="2026-04-16T18:00:00Z"
      >Calculating…</time>
      <span
        data-testid="test-todo-status"
        id="status-badge"
        class="status-in-progress"
        aria-label="Status: In Progress"
      >In Progress</span>
    </div>

    <div class="divider"></div>

    <ul data-testid="test-todo-tags" role="list" aria-label="Tags">
      <li data-testid="test-todo-tag-work" role="listitem">work</li>
      <li data-testid="test-todo-tag-urgent" role="listitem">urgent</li>
      <li data-testid="test-todo-tag-design" role="listitem">design</li>
    </ul>

    <div class="actions">
      <button
        data-testid="test-todo-edit-button"
        class="btn"
        aria-label="Edit task"
      >
        ✏️ Edit
      </button>
      <button
        data-testid="test-todo-delete-button"
        class="btn"
        aria-label="Delete task"
      >
        🗑️ Delete
      </button>
    </div>

  </article>

  <script src="script.js"></script>
</body>
</html>
